<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Finance Backend API Docs</title>
    <link
      rel="stylesheet"
      href="https://unpkg.com/swagger-ui-dist@5/swagger-ui.css"
    />
    <style>
      body {
        margin: 0;
        background: #0b1220;
      }
      .topbar {
        display: none;
      }
      .swagger-ui .info .title {
        color: #e5e7eb;
      }
    </style>
  </head>
  <body>
    <div id="swagger-ui"></div>
    <script src="https://unpkg.com/swagger-ui-dist@5/swagger-ui-bundle.js"></script>
    <script src="https://unpkg.com/swagger-ui-dist@5/swagger-ui-standalone-preset.js"></script>
    <script>
      // On GitHub Pages, the site is hosted at `/<repo>/`.
      // This computes the repo name from the current URL and loads the spec from:
      // `https://<user>.github.io/<repo>/openapi.yaml`
      const repo = window.location.pathname.split("/").filter(Boolean)[0];
      const specUrl = `/${repo}/openapi.yaml`;

      window.ui = SwaggerUIBundle({
        url: specUrl,
        dom_id: "#swagger-ui",
        deepLinking: true,
        presets: [SwaggerUIBundle.presets.apis, SwaggerUIStandalonePreset],
        layout: "StandaloneLayout",
      });
    </script>
  </body>
</html>
