openapi: 3.0.3
info:
  title: Finance Backend API
  version: 1.0.0
servers:
  - url: http://localhost:3000
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    SuccessEnvelope:
      type: object
      properties:
        success:
          type: boolean
          example: true
    ErrorResponse:
      type: object
      properties:
        success:
          type: boolean
          example: false
        error:
          type: object
          properties:
            message:
              type: string
            details:
              nullable: true
    UserPublic:
      type: object
      properties:
        id: { type: string, format: uuid }
        email: { type: string, format: email }
        name: { type: string }
        role: { type: string, enum: [VIEWER, ANALYST, ADMIN] }
        status: { type: string, enum: [ACTIVE, INACTIVE] }
    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
          example: admin@example.com
        password:
          type: string
          example: password123
    LoginData:
      type: object
      properties:
        token:
          type: string
        user:
          $ref: "#/components/schemas/UserPublic"
    LoginResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        data:
          $ref: "#/components/schemas/LoginData"
    RegisterRequest:
      type: object
      required: [name, email, password]
      properties:
        name: { type: string }
        email: { type: string, format: email }
        password: { type: string }
    RegisterResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        data:
          allOf:
            - $ref: "#/components/schemas/UserPublic"
            - type: object
              properties:
                createdAt: { type: string, format: date-time }
                updatedAt: { type: string, format: date-time }
    Record:
      type: object
      properties:
        id: { type: string, format: uuid }
        amount: { type: number }
        type: { type: string, enum: [INCOME, EXPENSE] }
        category: { type: string }
        date: { type: string, format: date-time }
        notes: { type: string, nullable: true }
        userId: { type: string, format: uuid }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
        user:
          type: object
          properties:
            name: { type: string }
            email: { type: string, format: email }
    RecordCreateRequest:
      type: object
      required: [amount, type, category, date]
      properties:
        amount: { type: number, example: 2500 }
        type: { type: string, enum: [INCOME, EXPENSE], example: EXPENSE }
        category: { type: string, example: Travel }
        date: { type: string, format: date-time }
        notes: { type: string, nullable: true }
    RecordUpdateRequest:
      type: object
      properties:
        amount: { type: number }
        type: { type: string, enum: [INCOME, EXPENSE] }
        category: { type: string }
        date: { type: string, format: date-time }
        notes: { type: string, nullable: true }
    RecordListResponse:
      type: object
      properties:
        success: { type: boolean, example: true }
        data:
          type: array
          items:
            $ref: "#/components/schemas/Record"
        metadata:
          type: object
          properties:
            total: { type: integer, example: 5 }
            page: { type: integer, example: 1 }
            limit: { type: integer, example: 10 }
            totalPages: { type: integer, example: 1 }
    RecordSingleResponse:
      type: object
      properties:
        success: { type: boolean, example: true }
        data:
          $ref: "#/components/schemas/Record"
    UserListResponse:
      type: object
      properties:
        success: { type: boolean, example: true }
        data:
          type: array
          items:
            allOf:
              - $ref: "#/components/schemas/UserPublic"
              - type: object
                properties:
                  createdAt: { type: string, format: date-time }
    UserSingleResponse:
      type: object
      properties:
        success: { type: boolean, example: true }
        data:
          $ref: "#/components/schemas/UserPublic"
    DashboardSummaryResponse:
      type: object
      properties:
        success: { type: boolean, example: true }
        data:
          type: object
          properties:
            summary:
              type: object
              properties:
                totalIncome: { type: number }
                totalExpense: { type: number }
                netBalance: { type: number }
            categoryTotals:
              type: array
              items:
                type: object
                properties:
                  category: { type: string }
                  amount: { type: number }
            recentActivity:
              type: array
              items:
                type: object
                properties:
                  id: { type: string, format: uuid }
                  type: { type: string, enum: [INCOME, EXPENSE] }
                  category: { type: string }
                  amount: { type: number }
                  date: { type: string, format: date-time }
security:
  - bearerAuth: []
paths:
  /health:
    get:
      security: []
      summary: Health check
      responses:
        "200":
          description: OK
  /api/auth/register:
    post:
      security: []
      summary: Register a user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RegisterResponse"
        "400":
          description: Validation / bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/auth/login:
    post:
      security: []
      summary: Login and receive JWT
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/dashboard/summary:
    get:
      summary: Dashboard summary (VIEWER/ANALYST/ADMIN)
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummaryResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/records:
    get:
      summary: List records (ANALYST/ADMIN)
      parameters:
        - in: query
          name: startDate
          schema: { type: string, format: date-time }
        - in: query
          name: endDate
          schema: { type: string, format: date-time }
        - in: query
          name: type
          schema: { type: string, enum: [INCOME, EXPENSE] }
        - in: query
          name: category
          schema: { type: string }
        - in: query
          name: page
          schema: { type: integer, default: 1 }
        - in: query
          name: limit
          schema: { type: integer, default: 10 }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecordListResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      summary: Create a record (ADMIN)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RecordCreateRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecordSingleResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/records/{id}:
    get:
      summary: Get record by id (ANALYST/ADMIN)
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecordSingleResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      summary: Update record (ADMIN)
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RecordUpdateRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecordSingleResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      summary: Delete record (ADMIN)
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "204":
          description: No content
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/users:
    get:
      summary: List users (ADMIN)
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserListResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      summary: Create user (ADMIN)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, email, password]
              properties:
                name: { type: string, example: "Jane Doe" }
                email: { type: string, format: email, example: "jane@example.com" }
                password: { type: string, example: "password123" }
                role: { type: string, enum: [VIEWER, ANALYST, ADMIN], example: VIEWER }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserSingleResponse"
        "400":
          description: Validation / bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/users/{id}/role:
    put:
      summary: Update user role/status (ADMIN)
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                role: { type: string, enum: [VIEWER, ANALYST, ADMIN] }
                status: { type: string, enum: [ACTIVE, INACTIVE] }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserSingleResponse"
        "400":
          description: Validation / bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

